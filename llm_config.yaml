# Provider configurations — primary config format (OpenCode-compatible)
# Each provider has default options that apply to all its models.
# Models inherit baseURL, apiKey env, and timeout from their provider.
provider:
  anthropic:
    name: "Anthropic"
    env: ["ANTHROPIC_API_KEY"]
    options:
      baseURL: https://api.anthropic.com/v1
      timeout: 300000
      setCacheKey: true
    models:
      claude-sonnet-4-20250514:
        name: "Claude Sonnet 4"
        limit: { context: 200000, output: 50000 }

  deepseek:
    name: "DeepSeek"
    env: ["DEEPSEEK_API_KEY"]
    options:
      baseURL: https://api.deepseek.com/v1
      timeout: 300000
    models:
      deepseek-v4-pro:
        name: "DeepSeek V4 Pro"
        limit: { context: 64000, output: 8192 }
      deepseek-v4-flash:
        name: "DeepSeek V4 Flash"
        limit: { context: 64000, output: 8192 }

  openai:
    name: "OpenAI"
    env: ["OPENAI_API_KEY"]
    options:
      baseURL: https://api.openai.com/v1
      timeout: 300000
    models:
      gpt-4o:
        name: "GPT 4o"
        limit: { context: 128000, output: 4096 }

  ollama:
    name: "Ollama (local)"
    options:
      baseURL: http://localhost:11434/api
      timeout: 60000

# Legacy model pool (kept for backward compatibility)
# New configs should use the `provider:` section above instead.
models:
  claude-sonnet-4:
    model: anthropic/claude-sonnet-4-20250514
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8192
    fallback: claude-haiku-3-5
    timeout_secs: 120
    rate_limit: { rpm: 50, tpm: 100000 }

  ollama-qwen:
    model: ollama/qwen2.5:3b
    max_tokens: 4096
    timeout_secs: 60

  deepseek-v4-pro:
    model: deepseek/deepseek-v4-pro
    api_key_env: DEEPSEEK_API_KEY
    max_tokens: 8192
    timeout_secs: 120
    rate_limit: { rpm: 50, tpm: 200000 }

  deepseek-v4-flash:
    model: deepseek/deepseek-v4-flash
    api_key_env: DEEPSEEK_API_KEY
    max_tokens: 8192
    timeout_secs: 120
    rate_limit: { rpm: 100, tpm: 500000 }